---
# GitHub Actions workflow for commits pushed to the box2d-jni repo - all branches

name: CI at GitHub
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  Java21-Linux64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential

      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      
      - name: gradlew test
        env:
          JAVA_TOOL_OPTIONS: >-
            -DBOX2D_JNI_NDEBUG=true
            -Dorg.box2d.jni.system.Debug.Color=true
        run: |
          ./gradlew -Pbox2d.jni.bt=Debug -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true clean test
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-linux
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Linux_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      - name: gradlew build
        env:
          JAVA_TOOL_OPTIONS: >-
            -DBOX2D_JNI_NDEBUG=true
            -Dorg.box2d.jni.system.Debug.Color=true
        run: |
          ./gradlew -Pbox2d.jni.bt=Debug -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true clean test
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-linux
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Windows64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        shell: msys2 {0}
        run: |
          java -version
          gcc --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi
      - name: gradlew build
        shell: msys2 {0}
        env:
          JAVA_TOOL_OPTIONS: >-
            -DBOX2D_JNI_NDEBUG=true
            -Dorg.box2d.jni.system.Debug.Color=true
        run: |
          ./gradlew -Pbox2d.jni.bt=Debug -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true clean test
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-windows
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Windows_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          path-type: inherit
          install: >
            mingw-w64-clang-aarch64-toolchain
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-autotools
      - name: Verify toolchain
        shell: msys2 {0}
        run: |
            java -version
            clang --version
            clang -dumpmachine
            cmake --version
            pkg-config --version
      - name: Verify environment
        shell: msys2 {0}
        run: |
          echo "MSYSTEM=$MSYSTEM"
          which clang
          clang -dumpmachine
          uname -m
      - uses: gradle/actions/setup-gradle@v6
      - name: gradlew build
        shell: msys2 {0}
        env:
          JAVA_TOOL_OPTIONS: >-
            -DBOX2D_JNI_NDEBUG=true
            -Dorg.box2d.jni.system.Debug.Color=true
        run: |
            export PATH=/clangarm64/bin:/usr/bin:/bin
            export CC=clang
            export CXX=clang++
            export LD=ld.lld
            export AR=llvm-ar
            export RANLIB=llvm-ranlib
            export NM=llvm-nm
            ./gradlew -Pbox2d.jni.bt=Debug -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true clean test
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-windows
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore
  
  Java21-MacOSX64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          brew install \
            autoconf \
            automake \
            libtool \
            texinfo \
            pkg-config \
            cmake
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          clang --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi
      - name: gradlew build
        env:
          JAVA_TOOL_OPTIONS: >-
            -DBOX2D_JNI_NDEBUG=true
            -Dorg.box2d.jni.system.Debug.Color=true
        run: |
          ./gradlew -Pbox2d.jni.bt=Debug -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true clean test
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-macos
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-MacOSX_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          brew install \
            autoconf \
            automake \
            libtool \
            texinfo \
            pkg-config \
            cmake
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          clang --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5.0'
      - name: gradlew build
        env:
          JAVA_TOOL_OPTIONS: >-
            -DBOX2D_JNI_NDEBUG=true
            -Dorg.box2d.jni.system.Debug.Color=true
        run: |
          ./gradlew -Pbox2d.jni.bt=Debug -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true clean test
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-macos
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore
