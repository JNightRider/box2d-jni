---
# GitHub Actions workflow for commits pushed to the box2d-jni repo - all branches

name: CI at GitHub
on: [push, workflow_dispatch]

jobs:
  Java11-Linux:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 11
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libffi-dev \
            pkg-config \
            cmake
      
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      
      - name: gradlew build
        #if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          ./gradlew build \
            --console=plain
      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: box2d-jni-linux
          path: lib/*.jar
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore
