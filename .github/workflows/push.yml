---
# GitHub Actions workflow for commits pushed to the box2d-jni repo - all branches

name: CI at GitHub
on: [push, workflow_dispatch]

jobs:
  Java21-Linux:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential

      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      
      - name: gradlew build
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-linux
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Linux64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential

      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      
      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=true -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-linux_x64
          path: |
            lib/*.jar
            lib/*.aar
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-linux
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Linux_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      - name: gradlew build
        #if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-linux_arm64
          path: |
            lib/*.jar
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-linux
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Windows64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        shell: msys2 {0}
        run: |
          java -version
          gcc --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi
      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        shell: msys2 {0}
        run: |
            ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-windows64
          path: lib/*.jar
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-windows
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Windows_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          path-type: inherit
          install: >
            base-devel
            mingw-w64-clang-aarch64-toolchain
            mingw-w64-clang-aarch64-autotools
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-libffi
      - name: Verify toolchain
        shell: msys2 {0}
        run: |
            java -version
            clang --version
            clang -dumpmachine
            cmake --version
            pkg-config --version
            pkg-config --modversion libffi
      - name: Verify environment
        shell: msys2 {0}
        run: |
          echo "MSYSTEM=$MSYSTEM"
          which clang
          clang -dumpmachine
          uname -m
      - uses: gradle/actions/setup-gradle@v6
      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        shell: msys2 {0}
        run: |
            ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-windows_arm64
          path: lib/*.jar
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-windows
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore
  
  Java21-MacOSX64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          brew install \
            autoconf \
            automake \
            libtool \
            texinfo \
            pkg-config \
            cmake
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          clang --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi
      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-macos_64
          path: lib/*.jar
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-macos
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-MacOSX_ARM64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          brew install \
            autoconf \
            automake \
            libtool \
            texinfo \
            pkg-config \
            cmake
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          clang --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5.0'
      - name: gradlew build
        #if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-macos_arm64
          path: lib/*.jar
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-macos
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - Java21-Linux64
      - Java21-Linux_ARM64
      - Java21-Windows64
      - Java21-Windows_ARM64
      - Java21-MacOSX64
      - Java21-MacOSX_ARM64
    
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      # include: lib | Linux
      - name: Download Linux x64 | Android artifacts       
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-linux_x64
          path: lib
      - name: Download Linux arm64
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-linux_arm64
          path: lib


      # include: lib | Windows
      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-windows64
          path: lib
      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-windows_arm64
          path: lib

      # include: lib | Macos
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-macos_64
          path: lib
      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-macos_arm64
          path: lib

      # Maven - Publication
      - name: Verify lib artifacts
        run: |
          ls -R lib
          find lib -type f \( -name "*.jar" -o -name "*.aar" \)
      - name: Show artifacts
        run: |
          ls -lah lib
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Maven Central
        env:
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.CENTRAL_PASSWORD }}
        run: |
          ./gradlew jreleaserConfig --console=plain
          ./gradlew publish --console=plain
          ./gradlew jreleaserDeploy --console=plain