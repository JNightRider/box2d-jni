---
# GitHub Actions workflow for commits pushed to the box2d-jni repo - all branches

name: CI at GitHub
on: [push, workflow_dispatch]

jobs:
  Java21-Linux:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential

      - uses: gradle/actions/setup-gradle@v4
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      
      - name: gradlew build
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  Java21-Linux64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            autoconf \
            automake \
            libtool \
            texinfo \
            build-essential

      - uses: gradle/actions/setup-gradle@v4
      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          gcc --version
          cmake --version
          pkg-config --modversion libffi
      
      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=true -Pbox2d.jni.desktop=true build \
            --console=plain
      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-linux_x64
          path: lib/*.jar
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore
          
  Java21-Windows64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify toolchain
        shell: msys2 {0}
        run: |
          java -version
          gcc --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi

      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        shell: msys2 {0}
        run: |
            ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain

      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-windows64
          path: lib/*.jar

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-windows
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore
  
  Java21-MacOSX64:
    if: contains(toJson(github.event.commits), '[ci skip] ') == false
    runs-on: macos-26-intel

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Install dependencies
        run: |
          brew install \
            autoconf \
            automake \
            libtool \
            texinfo \
            pkg-config \
            cmake

      - uses: gradle/actions/setup-gradle@v6

      - name: Verify toolchain
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          clang --version
          cmake --version
          pkg-config --version
          pkg-config --modversion libffi

      - name: gradlew build
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ./gradlew -Pbox2d.jni.bt=Release -Pbox2d.jni.android=false -Pbox2d.jni.desktop=true build \
            --console=plain

      - name: Upload jars        
        uses: actions/upload-artifact@v7
        with:
          name: box2d-jni-macos_64
          path: lib/*.jar

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report-macos
          path: |
            modules/libraries/box2d-core/build/reports/tests/test
          if-no-files-found: ignore

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - Java21-Linux64
      - Java21-Windows64
      - Java21-MacOSX64
    
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      # include: lib | Linux x64 & Android
      - name: Download Linux x64 | Android artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-linux_x64
          path: lib

      # include: lib | Windows x64
      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-windows64
          path: lib

      # include: lib | Macos x64 
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: box2d-jni-macos_64
          path: lib

      # Maven - Publication
      - name: Show artifacts
        run: |
          ls -lah lib
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Publish to Maven Central
        run: |          
          ./gradlew \
            -Pbox2d.jni.android=false \
            -Pbox2d.jni.desktop=false \
            release \
            --console=plain \
            -PsigningKeyEncoded="${{ secrets.SIGNING_KEY_ENCODED }}" \
            -PsigningPassword="${{ secrets.SIGNING_PASSWORD }}" \
            -PcentralUsername="${{ secrets.CENTRAL_USERNAME }}" \
            -PcentralPassword="${{ secrets.CENTRAL_PASSWORD }}"