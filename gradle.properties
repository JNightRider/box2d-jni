## configure Gradle properties for building the Box2d-JNI Project

# Box2d-JNI Test:
box2d.jni.test=true

# Native Box2d
# A version of box2d that uses Box2d-JNI as a basis for linking with Java.
box2d.source.code=b22026-05-29

# To enable the cache persistently
org.gradle.configuration-cache=false

netbeans.hint.jdkPlatform=JDK_25
